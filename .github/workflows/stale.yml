name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v10
        with:
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 30 days if no further activity occurs.

            Thank you for your contributions to CAI!
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 30 days if no further activity occurs.

            Thank you for your contributions to CAI!
          days-before-stale: 60
          days-before-close: 30
          exempt-issue-labels: 'keep,security,good first issue,help wanted'
          exempt-pr-labels: 'keep,security,work-in-progress'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          delete-branch: true
