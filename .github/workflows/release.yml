name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          NOTES_FILE="release-notes.md"

          # Extract section from CHANGELOG
          if [ -f "CHANGELOG.md" ]; then
            # Extract content between the version header and the next version header
            sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1 > $NOTES_FILE

            # If file is empty or doesn't contain the version
            if [ ! -s "$NOTES_FILE" ]; then
              echo "Release $VERSION" > $NOTES_FILE
              echo "" >> $NOTES_FILE
              echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." >> $NOTES_FILE
            fi
          else
            echo "Release $VERSION" > $NOTES_FILE
          fi

          cat $NOTES_FILE

      - name: Create Release
        id: create
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-alpha') || contains(steps.get_version.outputs.version, '-beta') || contains(steps.get_version.outputs.version, '-rc') }}

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cai
            asset_name: cai-linux-x86_64

          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: cai
            asset_name: cai-linux-aarch64
            cross: true

          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: cai
            asset_name: cai-macos-x86_64

          # macOS aarch64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: cai
            asset_name: cai-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Strip binary
        run: |
          if [ "${{ runner.os }}" = "macOS-latest" ]; then
            strip -x target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          else
            strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          fi

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "macOS-latest" ]; then
            tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
            cd ../../..
            shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          else
            tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
            cd ../../..
            sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          fi

      - name: Upload binary to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.asset_name }}.tar.gz
          asset_name: ${{ matrix.asset_name }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload checksum to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.asset_name }}.tar.gz.sha256
          asset_name: ${{ matrix.asset_name }}.tar.gz.sha256
          asset_content_type: text/plain

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [create-release, build]
    if: "!(contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc'))"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Login to crates.io
        run: cargo login ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish crates
        run: |
          # Publish in dependency order
          cargo publish --package cai-core
          sleep 10  # Wait for crates.io index to update
          cargo publish --package cai-storage
          sleep 10
          cargo publish --package cai-output
          sleep 10
          cargo publish --package cai-ingest
          sleep 10
          cargo publish --package cai-query
          sleep 10
          cargo publish --package cai-plugin
          sleep 10
          cargo publish --package cai-tui
          sleep 10
          cargo publish --package cai-web
          sleep 10
          cargo publish --package cai-cli

  homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [create-release, build]
    if: "!(contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc'))"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          cat > cai.rb <<EOF
          class Cai < Formula
            desc "Better alternative to devsql in Rust - Coding Agent Insights"
            homepage "https://github.com/${{ github.repository }}"
            url "${{ github.server_url }}/${{ github.repository }}/archive/refs/tags/\${VERSION}.tar.gz"
            sha256 "$(git ls-remote --tags origin | grep refs/tags/\${VERSION}$ | awk '{print $1}' | git rev-parse '\${VERSION}^{{}' | git archive -o - HEAD | gzip | shasum -a 256 | awk '{print $1}')"

            license "MIT OR Apache-2.0"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              system "\#{bin}/cai", "--version"
            end
          end
          EOF
          cat cai.rb

      - name: Push to homebrew tap
        run: |
          # This would typically push to a homebrew tap repository
          # Example: git push git@github.com:cai-dev/homebrew-tap.git main
          echo "Homebrew formula generated. Push to your tap repository manually or set up automation."

  update-changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    needs: [create-release, build]
    if: "!(contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc'))"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare next version
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"

          # Update CHANGELOG for unreleased section
          sed -i "/^## \[Unreleased\]/a\\\\n## [Unreleased]\\n\\n### Added\\n\\n### Changed\\n\\n### Deprecated\\n\\n### Removed\\n\\n### Fixed\\n\\n### Security" CHANGELOG.md

          # Add new version link at bottom
          echo "" >> CHANGELOG.md
          echo "[Unreleased]: https://github.com/${{ github.repository }}/compare/v${VERSION}...HEAD" >> CHANGELOG.md

          git checkout -b chore/update-changelog-$VERSION
          git add CHANGELOG.md
          git commit -m "chore: prepare changelog for $VERSION"
          git push origin chore/update-changelog-$VERSION
